name: Scrape

on:
  # Cron paused for the off-season (no live games to refresh until football
  # preseason in mid-August 2026). Re-enable by uncommenting the schedule
  # block below; both crons were the in-season cadence (hourly base +
  # Fri-evening 15-min windows) used during the 2025-26 football season.
  # schedule:
  #   - cron: "*/15 0-5 * * 6"  # Fri evenings/Sat early UTC (15-min cadence)
  #   - cron: "5 * * * *"        # hourly otherwise
  workflow_dispatch:
    inputs:
      sport:
        description: "Space-separated sport id(s) to scrape. Defaults to all live sports."
        required: false
        default: "football boys_basketball girls_basketball"
      season:
        description: "Season identifier"
        required: false
        default: "2025-26"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrapers
        working-directory: scraper
        env:
          # On cron runs `inputs.sport` is empty, so we scrape every live sport.
          # On manual dispatch the user can pass a single id (or several
          # space-separated) to target a subset.
          SPORTS: ${{ github.event.inputs.sport || 'football boys_basketball girls_basketball' }}
          SEASON: ${{ github.event.inputs.season || '2025-26' }}
        run: |
          for sport in $SPORTS; do
            echo "::group::scraping $sport"
            if python main.py --sport "$sport" --season "$SEASON"; then
              echo "ok: $sport"
            else
              # Don't kill the run — let the other sports' data still commit.
              echo "::warning::scrape failed for $sport — continuing with remaining sports"
            fi
            echo "::endgroup::"
          done

      # OG share-card PNGs. Built once per scrape: build the frontend,
      # serve dist/ on localhost, run Playwright to screenshot each
      # in-window game's /card/ route, commit any new PNGs with the data.
      # If this step fails, log and continue — the data commit is more
      # important than the cards.
      - name: Setup Node (for OG card build)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend (for card server)
        working-directory: frontend
        run: npm run build

      - name: Install Playwright chromium
        working-directory: scraper
        run: python -m playwright install --with-deps chromium

      - name: Stage dist + data under /wpr-prep-sports prefix
        run: |
          # The widget's built assets reference /wpr-prep-sports/assets/* so
          # the local server must serve under that prefix. Build a small
          # _serve/ tree that mirrors what GH Pages exposes.
          rm -rf _serve
          mkdir -p _serve/wpr-prep-sports/data
          cp -R frontend/dist/. _serve/wpr-prep-sports/
          cp -R data/. _serve/wpr-prep-sports/data/

      - name: Generate OG share cards
        working-directory: scraper
        run: |
          npx --yes http-server ../_serve -p 8080 --silent &
          SERVER_PID=$!
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:8080/wpr-prep-sports/ > /dev/null; then break; fi
            sleep 1
          done
          if ! python scripts/generate_og_cards.py \
                --base-url http://localhost:8080/wpr-prep-sports; then
            echo "::warning::OG card generation failed — continuing without card update"
          fi
          kill $SERVER_PID || true
          rm -rf ../_serve

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scrape $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
