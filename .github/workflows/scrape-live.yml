name: Scrape Live

# High-frequency live-scores cron — runs during typical game windows
# only. The job is cheap (~10s) and a no-op off-season (the live merge
# returns "0 updates" when nothing's in progress), so the cron is safe
# to leave on year-round.
#
# Schedule covers Friday evening football in both Central Standard
# Time (UTC-6) and Daylight Time (UTC-5):
#   * Fri 23:00-23:59 UTC  (5pm or 6pm CT — pregame)
#   * Sat 00:00-05:59 UTC  (Friday evening games CT)

on:
  schedule:
    - cron: "*/10 23 * * 5"   # Friday evening UTC (start of CT gameday)
    - cron: "*/10 0-5 * * 6"  # Saturday early UTC (Friday night CT)
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport id for live scrape (currently only 'football' is wired)."
        required: false
        default: "football"

permissions:
  contents: write

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live scrape
        working-directory: scraper
        env:
          SPORT: ${{ github.event.inputs.sport || 'football' }}
        run: python main.py --sport "$SPORT" --live

      - name: Commit live updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No live score changes."
          else
            git commit -m "live: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
