name: Scrape Live

# High-frequency live-scores cron — runs during typical game windows
# only. The job is cheap (~10s per sport) and a no-op off-season (the
# live merge returns "0 updates" when nothing's in progress), so the
# cron is safe to leave on year-round.
#
# Schedule covers Central Time game windows (UTC-6 std / UTC-5 DST):
#   Friday evening (CT) → 23:00-05:59 UTC (Fri night + early Sat UTC)
#     – Football (Aug-Nov), Volleyball (Aug-Oct), Basketball (Nov-Mar)
#   Tuesday/Thursday evening (CT) → 23:00-05:59 UTC (Wed/Fri UTC)
#     – Volleyball, Basketball, Hockey midweek games
#   Saturday afternoon (CT) → 18:00-23:00 UTC
#     – Basketball/Volleyball tournament days
#
# Each fires the live scrape for every sport — sports that aren't
# in-season return empty + no commit; cost is ~60s total wall time.

on:
  schedule:
    - cron: "*/10 23 * * 1,2,3,4,5"  # Mon-Fri evening UTC (CT weeknight)
    - cron: "*/10 0-5 * * 2,3,4,5,6" # Tue-Sat early UTC (CT weeknight late)
    - cron: "*/10 18-22 * * 6"       # Saturday afternoon UTC (tournament)
  workflow_dispatch:
    inputs:
      sport:
        description: "Single sport id to run; default runs every sport."
        required: false
        default: ""

permissions:
  contents: write
  # actions: write lets the final step dispatch the Deploy workflow.
  # Bot-authored pushes don't trigger downstream workflows (GitHub loop
  # protection), so without this an updated data/ never reaches Pages.
  actions: write

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install deps
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live scrape (per-sport)
        working-directory: scraper
        env:
          # On cron runs we cycle through every sport. On manual dispatch
          # the user can pass a single sport id.
          SPORTS: ${{ github.event.inputs.sport || 'football boys_basketball girls_basketball volleyball boys_hockey girls_hockey' }}
        run: |
          for sport in $SPORTS; do
            echo "::group::live $sport"
            if python main.py --sport "$sport" --live; then
              echo "ok: $sport"
            else
              echo "::warning::live failed for $sport — continuing"
            fi
            echo "::endgroup::"
          done

      - name: Commit live updates
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No live score changes."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "live: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Bot pushes via GITHUB_TOKEN don't trigger Deploy on their own, so
      # kick it explicitly when there was actually a data change to ship.
      - name: Trigger Deploy
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
